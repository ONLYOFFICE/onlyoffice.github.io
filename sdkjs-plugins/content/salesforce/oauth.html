    <title>Salesforce</title>
</head>
<body spellcheck="false" class="noselect">
    <script>
        (function () {
            function parseLocation() {
                try {
                    const hash = window.location.hash.slice(1);
                    if (hash && window.opener) {
                        const params = Object.fromEntries(new URLSearchParams(hash));
                        const redirectUri = new URL('./oauth.html', window.location.href).href;
                        window.opener.postMessage({ type: 'salesforce_auth', params, redirectUri }, '*');
                    }
                } finally {
                    window.close();
                }
            }

            window.onload = parseLocation;
        })();
    </script>
</body>
</html>
