<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" href="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.css">
	<link rel="stylesheet" href="./resources/css/styles.css">
	<script src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins-ui.js"></script>
	<script src="scripts/polyfill.js" defer></script>
	<script src="scripts/storage.js" defer></script>
	<script src="scripts/ui.js" defer></script>
	<script src="scripts/utils.js" defer></script>
	<script src="scripts/data-fetcher.js" defer></script>
	<script src="scripts/common.js" defer></script>
	<script src="scripts/code.js" defer></script>
</head>
	<body class="noselect">
		<div id="plugins" class="plugin-store transparent">
			<aside>
				<div class="filter-by filter-by-installed">
					<input type="radio" name="main-filter" id="main-filter-marketplace" value="marketplace" checked>
					<label class="marketplace" for="main-filter-marketplace">
						<span>◎</span>
						<span class="main-filter-category i18n">Marketplace</span>
						<span class="amount">21</span>
					</label>
					<input type="radio" id="main-filter-installed" name="main-filter" value="installed">
					<label class="installed" for="main-filter-installed">
						<span>✓</span>
						<span class="main-filter-category i18n">Installed</span>
						<span class="amount">6</span>
					</label>
					<input type="radio" id="main-filter-updates" name="main-filter" value="updates">
					<label class="updates" for="main-filter-updates">
						<span>↑</span>
						<span class="main-filter-category i18n">Updates</span>
						<span class="amount mark">2</span>
					</label>
				</div>
				<div>
					<div class="categories-header i18n">Categories</div>
					<div class="filter-by filter-by-category">
						<input type="radio" id="category-filter-all" name="category-filter" value="all" checked>
						<label for="category-filter-all" class="all">
							<span>◎</span>
							<span class="category-name i18n">All plugins</span>
							<span class="amount">21</span>
						</label>
						<input type="radio" id="category-filter-onlyoffice" name="category-filter" value="onlyoffice">
						<label class="onlyoffice" for="category-filter-onlyoffice">
							<span><span class="onlyoffice">✓</span></span>
							<span class="category-name i18n">By ONLYOFFICE</span>
							<span class="amount">10</span>
						</label>
						<div style="height: 8px;">
						</div>
						<input type="radio" id="category-filter-recommended" name="category-filter" value="recommended">
						<label class="recommended" for="category-filter-recommended">
							<span>★</span>
							<span class="category-name i18n">Recommended</span>
							<span class="amount">9</span>
						</label>
						<!--input type="radio" name="category-filter" value="ai">
						<label class="ai">
							<span>✦</span>
							<span class="category-name i18n">AI &amp; Automation</span>
							<span class="amount">9</span>
						</label-->
						<input type="radio" id="category-filter-work" name="category-filter" value="work">
						<label class="work" for="category-filter-work">
							<span>⚒</span>
							<span class="category-name i18n">Work</span>
							<span class="amount">6</span>
						</label>
						<input type="radio" id="category-filter-entertainment" name="category-filter" value="entertainment">
						<label class="entertainment" for="category-filter-entertainment">
							<span>▶</span>
							<span class="category-name i18n">Entertainment</span>
							<span class="amount">6</span>
						</label>
						<input type="radio" id="category-filter-communication" name="category-filter" value="communication">
						<label class="communication" for="category-filter-communication">
							<span>✉</span>
							<span class="category-name i18n">Communication</span>
							<span class="amount">6</span>
						</label>
						<input type="radio" id="category-filter-specAbilities" name="category-filter" value="specAbilities">
						<label class="specAbilities" for="category-filter-specAbilities">
							<span>❖</span>
							<span class="category-name i18n">Special abilities</span>
							<span class="amount">6</span>
						</label>
						<!--label class="translation">
							<input type="radio" name="category-filter" value="translation">
							<span>文</span>
							<span class="category-name i18n">Translation</span>
							<span class="amount">6</span>
						</label>
						<label class="writing">
							<input type="radio" name="category-filter" value="writing">
							<span>¶</span>
							<span class="category-name i18n">Writing tools</span>
							<span class="amount">7</span>
						</label>
						<label class="productivity">
							<input type="radio" name="category-filter" value="productivity">
							<span>☑</span>
							<span class="category-name i18n">Productivity</span>
							<span class="amount">11</span>
						</label-->
						<input type="radio" id="category-filter-devTools" name="category-filter" value="devTools">
						<label class="devTools" for="category-filter-devTools">
							<span>&lt;&gt;</span>
							<span class="category-name i18n">Developer tools</span>
							<span class="amount">5</span>
						</label>
						<!--label class="integrations">
							<input type="radio" name="category-filter" value="integrations">
							<span>◈</span>
							<span class="category-name i18n">Integrations</span>
							<span class="amount">8</span>
						</label>
						<label class="media">
							<input type="radio" name="category-filter" value="media">
							<span>▦</span>
							<span class="category-name i18n">Media &amp; Design</span>
							<span class="amount">4</span>
						</label>
						<label class="utilities">
							<input type="radio" name="category-filter" value="utilities">
							<span>⚙</span>
							<span class="category-name i18n">Utilities</span>
							<span class="amount">6</span>
						</label>
						<label class="games">
							<input type="radio" name="category-filter" value="games">
							<span>♞</span>
							<span class="category-name i18n">Games</span>
							<span class="amount">2</span>
						</label-->
					</div>
				</div>
				<div class="submit-own-plugin">
					<!-- TODO think about how to open the form for uploading -->
					<a id="link_newPlugin" target="blank" href="https://github.com/ONLYOFFICE/onlyoffice.github.io/pulls">
						<span class="i18n link-text">Submit your own plugin</span>
						<span> →</span>
					</a>
				</div>
			</aside>
			<main>
				<div class="toolbar">
					<div>
						<div class="place-name i18n">Marketplace</div>
						<h1 class="i18n">All plugins</h1>
					</div>
					<div>
						<div class="search">
							<span>
								<svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
									<path fill-rule="evenodd" clip-rule="evenodd" d="M10 5.5C10 7.98528 7.98528 10 5.5 10C3.01472 10 1 7.98528 1 5.5C1 3.01472 3.01472 1 5.5 1C7.98528 1 10 3.01472 10 5.5ZM9.01953 9.72663C8.06578 10.5217 6.83875 11 5.5 11C2.46243 11 0 8.53757 0 5.5C0 2.46243 2.46243 0 5.5 0C8.53757 0 11 2.46243 11 5.5C11 6.83875 10.5217 8.06578 9.72663 9.01953L13.8536 13.1465L13.1465 13.8536L9.01953 9.72663Z" fill="currentColor" fill-opacity="0.8"/>
								</svg>
							</span>
							<input id="inp_search" class="i18n form-control" type="text" spellcheck="false" placeholder="Search plugins…" value="">
						</div>
					</div>
					<div id="toolbar_tools" class="toolbar_tools">
						<button id="btn_updateAll" class="btn-text-default btn_update i18n hidden" onclick="onClickUpdateAll()">Update All</button>
						<div class="hidden">
							<span id="span_sort">Sort by</span>
							<select id="select_sortBy">
								<option value="name">Name</option>
								<option value="raiting">Raiting</option>
								<option value="instalations">Instalations</option>
							</select>
						</div>
					</div>
				</div>
				<div id="plugins_container" class="plugins-container">
					<div id="div_main" class="plugins-list"></div>
				</div>
			</main>
		</div>
		<div id="div_error" class="error_main hidden"><div class="loader_background"></div></div>
		<div id="loader-container" class="asc-loader-container div_loader"><div class="loader_background"></div></div>
		<div id="div_rating_git" class="hidden"></div>
	</body>	
</html>
