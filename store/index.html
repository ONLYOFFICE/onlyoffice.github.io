<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" href="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.css">
	<link rel="stylesheet" href="./resources/css/styles.css">

<style>
  html, body {background: #f2f3f5;
    font-family: 'Inter', system-ui, sans-serif; color: #1a1d21; }
  body.dark { background: #15171a; }
</style>
	<script src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins-ui.js"></script>
	<script src="scripts/polyfill.js" defer></script>
	<script src="vendor/marked/marked.min.js" defer></script>
	<script src="scripts/storage.js" defer></script>
	<script src="scripts/ui.js" defer></script>
	<script src="scripts/utils.js" defer></script>
	<script src="scripts/data-fetcher.js" defer></script>
	<script src="scripts/code.js" defer></script>
</head>
	<body class="noselect">
		<img class="stars_grey" style="opacity: 0; z-index: -1000;" src="./resources/img/stars/rating-stars.svg"/>
		<div id="plugins" class="plugin-store transparent">
			<aside>
				<div class="filter-by filter-by-installed">
					<label class="marketplace">
						<input type="radio" name="main-filter" id="btn_marketplace" value="marketplace" checked>
						<span>◎</span>
						<span class="i18n">Marketplace</span>
						<span class="amount">21</span>
					</label>
					<label class="installed">
						<input type="radio" name="main-filter" value="installed">
						<span>✓</span>
						<span class="i18n">Installed</span>
						<span class="amount">6</span>
					</label>
					<label class="updates">
						<input type="radio" name="main-filter" value="updates">
						<span>↑</span>
						<span class="i18n">Updates</span>
						<span class="amount mark">2</span>
					</label>
				</div>
				<div>
					<div class="categories-header i18n">Categories</div>
					<div class="filter-by filter-by-category">
						<label class="all">
							<input type="radio" name="category-filter" value="all" checked>
							<span>◎</span>
							<span class="i18n">All plugins</span>
							<span class="amount">21</span>
						</label>
						<label class="onlyoffice">
							<input type="radio" name="category-filter" value="onlyoffice">
							<span><span class="onlyoffice">✓</span></span>
							<span class="i18n">By ONLYOFFICE</span>
							<span class="amount">10</span>
						</label>
						<div style="height: 8px;">
						</div>
						<label class="recommended">
							<input type="radio" name="category-filter" value="recommended">
							<span>★</span>
							<span class="i18n">Recommended</span>
							<span class="amount">9</span>
						</label>
						<!--label class="ai">
							<input type="radio" name="category-filter" value="ai">
							<span>✦</span>
							<span class="i18n">AI &amp; Automation</span>
							<span class="amount">9</span>
						</label-->
						<label class="work">
							<input type="radio" name="category-filter" value="work">
							<span>⚒</span>
							<span class="i18n">Work</span>
							<span class="amount">6</span>
						</label>
						<label class="entertainment">
							<input type="radio" name="category-filter" value="entertainment">
							<span>▶</span>
							<span class="i18n">Entertainment</span>
							<span class="amount">6</span>
						</label>
						<label class="communication">
							<input type="radio" name="category-filter" value="communication">
							<span>✉</span>
							<span class="i18n">Communication</span>
							<span class="amount">6</span>
						</label>
						<label class="specAbilities">
							<input type="radio" name="category-filter" value="specAbilities">
							<span>❖</span>
							<span class="i18n">Special abilities</span>
							<span class="amount">6</span>
						</label>
						<!--label class="translation">
							<input type="radio" name="category-filter" value="translation">
							<span>文</span>
							<span class="i18n">Translation</span>
							<span class="amount">6</span>
						</label>
						<label class="writing">
							<input type="radio" name="category-filter" value="writing">
							<span>¶</span>
							<span class="i18n">Writing tools</span>
							<span class="amount">7</span>
						</label>
						<label class="productivity">
							<input type="radio" name="category-filter" value="productivity">
							<span>☑</span>
							<span class="i18n">Productivity</span>
							<span class="amount">11</span>
						</label-->
						<label class="devTools">
							<input type="radio" name="category-filter" value="devTools">
							<span>&lt;&gt;</span>
							<span class="i18n">Developer tools</span>
							<span class="amount">5</span>
						</label>
						<!--label class="integrations">
							<input type="radio" name="category-filter" value="integrations">
							<span>◈</span>
							<span class="i18n">Integrations</span>
							<span class="amount">8</span>
						</label>
						<label class="media">
							<input type="radio" name="category-filter" value="media">
							<span>▦</span>
							<span class="i18n">Media &amp; Design</span>
							<span class="amount">4</span>
						</label>
						<label class="utilities">
							<input type="radio" name="category-filter" value="utilities">
							<span>⚙</span>
							<span class="i18n">Utilities</span>
							<span class="amount">6</span>
						</label>
						<label class="games">
							<input type="radio" name="category-filter" value="games">
							<span>♞</span>
							<span class="i18n">Games</span>
							<span class="amount">2</span>
						</label-->
					</div>
				</div>
				<div class="submit-own-plugin">
					<!-- TODO think about how to open the form for uploading -->
					<a id="link_newPlugin" class="i18n" target="blank" href="https://github.com/ONLYOFFICE/onlyoffice.github.io/pulls">Submit your own plugin</a>
				</div>
			</aside>
			<main>
				<div class="toolbar">
					<div>
						<div class="place-name i18n">Marketplace</div>
						<h1 class="i18n">All plugins</h1>
					</div>
					<div id="toolbar_tools" class="toolbar_tools">
						<button id="btn_updateAll" class="btn-text-default btn_update btn_install i18n hidden" onclick="onClickUpdateAll()">Update All</button>
						<div class="hidden">
							<span id="span_sort">Sort by</span>
							<select id="select_sortBy">
								<option value="name">Name</option>
								<option value="raiting">Raiting</option>
								<option value="instalations">Instalations</option>
							</select>
						</div>
					</div>
					<div>
						<div class="search">
							<span>⌕</span>
							<input id="inp_search" class="i18n" type="text" spellcheck="false" placeholder="Search plugins…" value="">
						</div>
					</div>
				</div>
				<div id="plugins_container" class="plugins-container">
					<div id="div_main" class="plugins-list"></div>
				</div>
			</main>
		</div>
		<div id="div_error" class="error_main hidden"><div class="loader_background"></div></div>
		<div id="loader-container" class="asc-loader-container div_loader"><div class="loader_background"></div></div>
		<div id="div_rating_git" class="hidden"></div>
	</body>	
</html>
